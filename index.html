<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,minimum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Business cats</title>
<link rel="stylesheet" href="css/style.css">
<style>
html,body{height:100%;height:calc(var(--vh,1vh)*100);overflow:hidden;background:#fdf6ee}
.screen{display:none;height:100%;height:calc(var(--vh,1vh)*100)}.screen.active{display:flex}

/* LOBBY */
#scr-lobby,#scr-over{background:linear-gradient(180deg,#b8c9d3,#fdf6ee);align-items:center;justify-content:center;flex-direction:column}
#scr-lobby h1{font-size:2rem;color:#1a1a1a;font-weight:bold;text-transform:uppercase;margin-bottom:10px;animation:lobbyTitleIn .5s ease}
#scr-lobby p{color:#666;font-size:.9rem;margin-bottom:20px}
.lobby-box{background:#fdf6ee;border:4px solid #b8c9d3;border-radius:12px;padding:20px;width:90%;max-width:380px;display:flex;flex-direction:column;gap:14px;animation:lobbyBoxIn .4s ease}
@keyframes lobbyTitleIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes lobbyBoxIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes cardIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

/* WAITING */
#scr-wait{background:linear-gradient(180deg,#b8c9d3,#fdf6ee);flex-direction:column}
.wait-wrap{padding:20px;width:100%;max-width:420px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.wait-wrap h2{font-size:1.1rem;color:#1a1a1a;text-align:center;text-transform:uppercase}
.code-text{color:#02516c;font-family:'Courier New',monospace}
.player-list{display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto}
.p-card{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fdf6ee;border:2px solid #b8c9d3;border-radius:10px;transition:transform .15s ease,box-shadow .15s ease}
@media(hover:hover){.p-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}}
.p-card .p-left{display:flex;align-items:center;gap:10px}
.p-card .p-name{font-weight:700;font-size:.9rem;color:#1a1a1a}
.p-card .p-role{font-size:.7rem;color:#666;text-transform:uppercase}
.p-card .p-right{display:flex;align-items:center;gap:8px}
.p-ready{width:10px;height:10px;border-radius:50%}.p-ready.y{background:#b3c79b}.p-ready.n{background:#d63031}
.p-kick-btn,.p-role-btn{background:none;border:none;font-size:1rem;cursor:pointer;padding:4px;opacity:.6}
.p-kick-btn:hover,.p-role-btn:hover{opacity:1}

/* HEADER */
.header_container{height:80px;position:relative;display:flex;justify-content:space-between;padding:0 16px;align-items:center;background:#fdf6ee;box-shadow:0 2px 2px rgba(0,0,0,.1);z-index:10;flex-shrink:0}
@media(max-width:1200px){.header_container{height:55px}}
@media(max-height:360px){.header_container{height:40px}}
.header_container .left_side_container{display:flex;align-items:center;gap:10px}
.header_container .avatar_container{display:flex;align-items:center;gap:6px}
.header_container .avatar-icon{font-size:1.5rem}
.header_container .player-info{display:flex;flex-direction:column}
.header_container .player-name{font-weight:700;font-size:.85rem;color:#1a1a1a}
.header_container .player-role{font-size:.7rem;color:#666;text-transform:uppercase}
.header_container .balance_container{display:flex;align-items:center;gap:4px}
.header_container .balance-coin{font-size:1.2rem}
.header_container .balance-value{font-family:'Courier New',monospace;font-size:1.1rem;font-weight:800;color:#02516c}
.header_container .right_side_container{display:flex;align-items:center;gap:8px;font-size:.85rem}
.header_container .season-label{font-weight:700;color:#1a1a1a}
.header_container .season-value{font-weight:800;color:#1a1a1a}
.header_container .season-max{color:#666}
.header_container .timer-value{font-family:'Courier New',monospace;font-weight:700;color:#02516c}
.header_container .btns_container{display:flex;align-items:center;gap:8px}

/* HOME BUTTON (back to street) */
.home-btn{cursor:pointer;padding:6px;display:flex;align-items:center}
.home-btn svg{width:28px;height:28px;fill:#c6a788}
@media(max-width:1200px){.home-btn svg{width:20px;height:20px}}

/* MAIN LAYOUT WRAPPER */
.main-layout-wrap{position:relative;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;width:100vw;height:100%;background-size:cover;flex:1}

/* STREET VIEW */
.street-view{flex:1;display:flex;flex-direction:column;overflow:hidden;transition:opacity .3s ease,transform .3s ease}
.street-view.fade-out{opacity:0;transform:translateY(-10px)}
.street-view__section{flex:1;display:flex;flex-direction:column;justify-content:flex-end;position:relative}
.street-view__section--nurseries{background:linear-gradient(180deg,#d4d18c 0%,#b3c79b 60%,#a0a1c2 100%)}
.street-view__section--shops{background:linear-gradient(180deg,#b3c79b 0%,#d4d18c 60%,#b8c9d3 100%)}

/* BUILDING ROW */
.buildings-row{display:flex;justify-content:center;align-items:flex-end;gap:12px;width:100%;max-width:1440px;margin:0 auto;padding:0 5vw 4vh}

/* BUILDING ITEM (one per player) */
.bldg{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s ease;z-index:1;width:20%;min-width:100px;max-width:280px;height:160px;padding:0 30px}
@media(max-width:1200px){.bldg{padding:0 15px;height:120px;min-width:80px}}
.bldg__inner{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;transition:transform .2s ease}
@media(hover:hover) and (pointer:fine){.bldg:not(.bldg--own):hover .bldg__inner{transform:scale(1.2) translateY(-8%);z-index:3}}
.bldg__img{width:100%;display:flex;align-items:center;justify-content:center;font-size:3.5rem;line-height:1;position:relative;flex:1}
.bldg__name{font-size:.75rem;font-weight:700;text-transform:uppercase;color:#873e2a;text-align:center;padding:4px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;position:relative;z-index:2}
@media(max-width:1200px){.bldg__img{font-size:2.5rem}.bldg__name{font-size:.65rem}}

/* NURSERY BUILDING */
.bldg--nursery .bldg__img{background:linear-gradient(180deg,#a0a1c2 0%,#7b7ca0 100%);border-radius:8px 8px 0 0;box-shadow:0 4px 8px rgba(0,0,0,.15)}
.bldg--nursery .bldg__name{background:rgba(160,161,194,.7);border-radius:0 0 6px 6px;padding:4px 10px}
/* SHOP BUILDING */
.bldg--shop .bldg__img{background:linear-gradient(180deg,#b8c9d3 0%,#8fa5b5 100%);border-radius:8px 8px 0 0;box-shadow:0 4px 8px rgba(0,0,0,.15)}
.bldg--shop .bldg__name{background:rgba(184,201,211,.7);border-radius:0 0 6px 6px;padding:4px 10px}

.bldg--own{z-index:3}
.bldg--own .bldg__inner{transform:scale(1.15) translateY(-5%)}
.bldg--own::after{content:'👑';position:absolute;top:-8px;right:10%;font-size:1.2rem;z-index:10}

.bldg--bankrupt{opacity:.5;pointer-events:none;filter:grayscale(.6)}

/* ROAD SEPARATOR */
.street-road{height:calc(var(--vh,1vh)*4.4);min-height:18px;background-color:#d4d18c;width:100%;flex-shrink:0;position:relative;z-index:2}
.street-road::before{content:'';position:absolute;top:50%;left:0;right:0;height:2px;background:repeating-linear-gradient(90deg,#8b7355 0 20px,transparent 20px 40px);transform:translateY(-1px)}

/* GROUND */
.street-ground{height:30px;background:linear-gradient(180deg,#b3c79b,#95a97d);flex-shrink:0}

/* INSIDE VIEW */
.inside-view{flex:1;display:none;flex-direction:column;overflow:hidden;background:#fdf6ee}
.inside-view.active{display:flex}

/* OWN NURSERIES (inside) */
.own-nurseries{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.own-nurseries__layout{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,1fr);gap:10px;width:90%;max-width:900px;height:85%}
.own-nurseries__houses-section{grid-column:1/3;grid-row:1/3;background:#fdf6ee;border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.own-nurseries__cats-section{grid-column:1/3;grid-row:3/5;background:#fdf6ee;border-radius:12px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;overflow-y:auto}
.own-nurseries__actions{grid-column:3;grid-row:1/5;display:flex;flex-direction:column;gap:8px;background:#fdf6ee;border-radius:12px;padding:10px;justify-content:center}
@media(max-width:1200px){
.own-nurseries__layout{grid-template-columns:1fr;grid-template-rows:auto;gap:8px;width:95%;height:auto}
.own-nurseries__houses-section{grid-column:1;grid-row:auto;max-height:40vh}
.own-nurseries__cats-section{grid-column:1;grid-row:auto;max-height:40vh}
.own-nurseries__actions{grid-column:1;grid-row:auto;flex-direction:row;flex-wrap:wrap;max-height:none}
}

/* HOUSE CARD */
.house-card{background:#b3c79b;border-radius:8px;padding:8px;position:relative}
.house-card__title{font-weight:700;font-size:.8rem;text-transform:uppercase;color:#fdf6ee;margin-bottom:6px}
.house-card__slots{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.house-card__slot{background:#fdf6ee;border-radius:4px;min-height:40px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid #eedbc7}
.house-card__slot.empty{opacity:.3}

/* CAT */
.cat{height:16vh;height:calc(var(--vh,1vh)*16);width:8.7vw;margin:0 8px;display:flex;flex-direction:column;justify-content:space-between;padding:8px;position:relative;background:#fdf6ee;border-radius:12px;cursor:pointer}
.cat:before{content:'';display:inline-block;position:absolute;top:0;left:0;right:0;bottom:0;border-radius:12px;transition:all .3s}
@media(hover:hover) and (pointer:fine){.cat:hover:before{background:rgba(255,255,255,.5)}}
@media(max-width:1200px){
.cat{width:calc(9vw-(env(safe-area-inset-left)+env(safe-area-inset-right))/8);height:10vh;height:calc(var(--vh,1vh)*10);flex-direction:row;box-shadow:0 2px 4px 4px rgba(0,0,0,.05);border-radius:4px;align-items:center;padding:2px 5px 2px 0;margin:0 6px}
}
@media(max-height:450px){.cat{height:8vh;height:calc(var(--vh,1vh)*8)}}
@media(max-height:360px){.cat{height:28px}}
@media(max-width:700px){.cat{margin:0 2px}}
.cat__image{display:flex;align-items:center;justify-content:center;font-size:2rem;flex:1}
.cat__count{font-weight:700;font-size:.85rem;color:#02516c;text-align:center}
.cat__description{text-align:center;font-size:.7rem;color:#666}
.cat__actions{display:flex;gap:4px;margin-top:4px;justify-content:center}
@media(max-width:1200px){.cat__actions{flex-direction:column;gap:2px}}

/* SHOP INSIDE */
.shop-page{flex:1;position:relative;overflow:hidden;background:#fdf6ee;display:flex;align-items:center;justify-content:center}

/* DEMAND ROW */
.demand-row{display:flex;align-items:center;justify-content:space-between;padding:8px;background:#fdf6ee;border-bottom:1px solid #b8c9d3}
.demand-row:last-child{border:none}
.demand-emoji{font-size:1.3rem}
.demand-breed{font-weight:700;font-size:.85rem;color:#1a1a1a}
.demand-price{color:#02516c;font-weight:700}
.demand-count{color:#666;font-size:.75rem}

/* CONTENT STORAGE */
.content-storage{margin:0 15px 10px;display:flex;background:#b3c79b;padding:10px;border-radius:16px;gap:10px;align-items:center}
@media(max-width:1200px){.content-storage{margin-left:8px;margin-right:8px;margin-bottom:8px;border-radius:8px;flex-wrap:wrap}}
.content-storage__cats{flex:1;display:flex;flex-wrap:wrap;gap:6px}
.content-storage__actions{display:flex;flex-direction:column;gap:6px}
@media(max-width:1200px){.content-storage__actions{flex-direction:row;flex-wrap:wrap;width:100%}}

/* DEMAND BOARD */
.demand-board{background:#fdf6ee;border:2px solid #b8c9d3;border-radius:12px;padding:10px;margin:0 15px 10px}
@media(max-width:1200px){.demand-board{margin-left:8px;margin-right:8px;margin-bottom:8px;border-radius:8px}}
.demand-board__title{font-weight:700;font-size:.9rem;text-transform:uppercase;color:#1a1a1a;margin-bottom:8px;text-align:center}

/* TEXT BUTTON */
.text_button{padding:9px 22px 9px;box-shadow:inset 0px 3px 0px rgba(255,255,255,.3),inset -3px -3px 0px rgba(0,0,0,.2);border-radius:8px;cursor:pointer;font-style:normal;font-weight:bold;font-size:20px;line-height:27px;text-transform:uppercase;color:#fffbe5;margin:0;display:flex;align-items:center;justify-content:center;white-space:nowrap;border:none;transition:all .15s ease;user-select:none}
.text_button:hover{filter:brightness(1.1)}
.text_button:active{transform:scale(.97);filter:brightness(.95)}
@media(max-width:1200px){.text_button{padding:4px 8px;border-radius:4px;align-self:center;font-size:10px;line-height:20px}}
.text_button--color-purple{background:#c6a788}
.text_button--color-purple:hover{background:linear-gradient(0deg,rgba(255,255,255,.4),rgba(255,255,255,.4)),#c6a788}
.text_button--color-purple:active{background:linear-gradient(0deg,rgba(0,0,0,.2),rgba(0,0,0,.2)),#c6a788}
.text_button--color-blue{background:#02516c}
.text_button--color-blue:hover{background:linear-gradient(0deg,rgba(255,255,255,.4),rgba(255,255,255,.4)),#02516c}
.text_button--color-blue:active{background:linear-gradient(0deg,rgba(0,0,0,.2),rgba(0,0,0,.2)),#02516c}
.text_button--color-green{background:#5aa122}
.text_button--color-green:hover{background:linear-gradient(0deg,rgba(255,255,255,.4),rgba(255,255,255,.4)),#5aa122}
.text_button--color-green:active{background:linear-gradient(0deg,rgba(0,0,0,.2),rgba(0,0,0,.2)),#5aa122}
.text_button--color-red{background:#d63031}
.text_button--color-red:hover{background:linear-gradient(0deg,rgba(255,255,255,.4),rgba(255,255,255,.4)),#d63031}

/* ACTIONS */
.own-nurseries__actions-item{background:#5aa122;border-radius:100px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.5rem;color:#fdf6ee;text-align:center;transition:all .15s;border:none;padding:0;box-shadow:0 4px 8px rgba(0,0,0,.15)}
.own-nurseries__actions-item:hover{transform:scale(1.1);box-shadow:0 6px 12px rgba(0,0,0,.2)}
.own-nurseries__actions-item:active{transform:scale(.95)}
.own-nurseries__actions-item--disabled{opacity:.4;pointer-events:none;transform:none!important}
@media(max-width:1200px){.own-nurseries__actions-item{width:48px;height:48px;font-size:1.2rem}}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;transition:opacity .2s ease}
.modal-overlay:not(.hidden){opacity:1}
.modal-overlay.hidden{display:none;pointer-events:none}
.modal{background:#fdf6ee;border-radius:16px;padding:20px;max-width:400px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);transform:scale(.95);transition:transform .2s ease}
.modal-overlay:not(.hidden) .modal{transform:scale(1)}
.modal__title{font-weight:700;font-size:1.1rem;text-transform:uppercase;color:#1a1a1a;margin-bottom:10px}
.modal__body{color:#666;font-size:.9rem;margin-bottom:16px}
.modal__body-actions{display:flex;gap:8px}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fdf6ee;padding:10px 20px;border-radius:10px;font-weight:600;font-size:.82rem;z-index:200;white-space:nowrap;max-width:90%;text-align:center;opacity:0;transition:opacity .2s ease,transform .2s ease}
.toast:not(.hidden){opacity:1;transform:translateX(-50%) translateY(0)}
.toast.hidden{display:none;pointer-events:none}

/* HIDDEN */
.hidden{display:none!important}

/* CONNECTION STATUS */
.conn-status{position:fixed;top:8px;right:8px;padding:4px 10px;border-radius:12px;font-size:.7rem;font-weight:700;z-index:300;text-transform:uppercase}
.conn-status.online{background:#5aa122;color:#fff}
.conn-status.offline{background:#d63031;color:#fff;animation:connBlink 1s infinite}
@keyframes connBlink{0%,100%{opacity:1}50%{opacity:.5}}

/* BALANCE PULSE */
.balance-pulse{animation:balPulse .3s ease}
@keyframes balPulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}

/* BUTTON GROUP */
.btn-group{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.btn-group .text_button{flex:1;min-width:120px}

/* WAITING CHECKBOX */
.chk{display:flex;align-items:center;gap:8px;font-size:.85rem;color:#1a1a1a}
.chk input{width:18px;height:18px;accent-color:#02516c}

/* HOST SECTION */
#host-sec{display:flex;flex-direction:column;gap:8px}

/* BANK */
.ltd__bank{background:#b1b2ca;border-radius:12px;padding:10px}
.ltd-bank-guarantee__wrapper{display:flex;flex-direction:column;justify-content:space-around;height:100%;padding:20px}
@media(max-width:1200px){.ltd-bank-guarantee__wrapper{padding:12px;gap:10px}}
.ltd-bank_guarantee__text{font-style:normal;font-weight:normal;font-size:14px;line-height:normal;text-transform:uppercase;color:#fdf6ee;padding-bottom:15px}
@media(max-width:1200px){.ltd-bank_guarantee__text{font-size:10px}}
.ltd-bank_guarantee__text-bold{font-weight:bold}
.ltd-bank_guarantee__block-main{display:flex;justify-content:flex-start;align-items:center;height:100%;flex-wrap:wrap;gap:10px}

/* NUMBER INPUT */
.number-input-wrapper{position:relative;width:108px;background:#fdf6ee;border:1px solid #eedbc7;border-radius:6px;height:28px;display:flex;align-items:center}
.number-input{width:100%;min-height:40px;background:none;font-size:20px;outline:none;border:none;text-align:center;font-weight:bold;color:#1a1a1a}
@media(min-width:1201px){.number-input-wrapper{height:40px}}

/* INPUT */
.inp{padding:12px;border:2px solid #b8c9d3;border-radius:12px;font-size:1.1rem;background:#fdf6ee;text-align:center;font-family:'Courier New',monospace;letter-spacing:6px;outline:none;color:#1a1a1a}
.inp:focus{border-color:#02516c}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:10px;color:#999;font-size:.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#b8c9d3}

/* OVER */
#scr-over{background:linear-gradient(180deg,#b8c9d3,#fdf6ee);align-items:center;justify-content:center;flex-direction:column}
#scr-over h1{font-size:1.5rem;color:#1a1a1a;font-weight:bold;text-transform:uppercase;margin-bottom:10px}
</style>
</head>
<body>
<div id="app">

<!-- CONNECTION STATUS -->
<div id="conn-status" class="conn-status offline">Offline</div>

<!-- LOBBY -->
<div id="scr-lobby" class="screen active">
<h1>🐱 Business cats</h1>
<p>Мультиплеер · До 6 игроков</p>
<div class="lobby-box">
<button id="btn-create" class="text_button text_button--color-blue">🏠 Создать комнату</button>
<div class="divider"><span>или войти по коду</span></div>
<div style="display:flex;gap:10px">
<input id="inp-code" type="text" class="inp" style="flex:1" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
<button id="btn-join" class="text_button text_button--color-green" style="flex:0 0 auto;width:auto;padding:12px 20px">🚀</button>
</div>
</div>
<p class="lobby-hint" style="font-size:.75rem;color:#999;text-align:center">🎲 Имя выберется случайно</p>
</div>

<!-- WAITING -->
<div id="scr-wait" class="screen">
<div class="wait-wrap">
<h2>⏳ Комната <span id="d-code" class="code-text">------</span></h2>
<button id="btn-copy" class="text_button text_button--color-purple" style="padding:8px 14px;font-size:.8rem">📋 Копировать код</button>
<div id="w-list" class="player-list"></div>
<div id="host-sec" class="hidden">
<label class="chk"><input type="checkbox" id="chk-host-play" checked><span>Хост играет</span></label>
<button id="btn-start" class="text_button text_button--color-green" disabled>🏆 Начать игру</button>
</div>
<label class="chk"><input type="checkbox" id="chk-ready"><span>Я готов</span></label>
<button id="btn-leave" class="text_button" style="background:#666;width:100%">Выйти</button>
</div>
</div>

<!-- GAME -->
<div id="scr-game" class="screen" style="flex-direction:column">
<header id="topbar" class="header_container">
<div class="left_side_container">
<span id="btn-home" class="home-btn hidden" title="На улицу">
<svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
</span>
<div class="avatar_container">
<span id="tb-emoji" class="avatar-icon">🐱</span>
<div class="player-info">
<span id="tb-name" class="player-name">Игрок</span>
<span id="tb-role" class="player-role">Роль</span>
</div>
</div>
</div>
<div class="balance_container">
<span class="balance-coin">🪙</span>
<span id="tb-balance" class="balance-value">0</span>
</div>
<div class="right_side_container">
<span class="season-label">Сезон</span>
<span id="tb-season" class="season-value">1</span>
<span class="season-max">/12</span>
<span id="tb-timer" class="timer-value">5:00</span>
</div>
</header>

<div class="main-layout-wrap">

<!-- STREET VIEW: buildings for each player -->
<div id="street-view" class="street-view">
<!-- Nurseries row -->
<div class="street-view__section street-view__section--nurseries">
<div id="nurseries-row" class="buildings-row"></div>
</div>
<!-- Road -->
<div class="street-road"></div>
<!-- Shops row -->
<div class="street-view__section street-view__section--shops">
<div id="shops-row" class="buildings-row"></div>
</div>
<!-- Ground -->
<div class="street-ground"></div>
</div>

<!-- INSIDE: NURSERY -->
<div id="inside-nursery" class="inside-view">
<div class="own-nurseries" style="background:#b3c79b">
<div class="own-nurseries__layout">
<div id="nur-houses" class="own-nurseries__houses-section"></div>
<div id="nur-cats" class="own-nurseries__cats-section"></div>
<div id="nur-actions" class="own-nurseries__actions"></div>
</div>
</div>
</div>

<!-- INSIDE: SHOP -->
<div id="inside-shop" class="inside-view">
<div class="shop-page">
<div style="width:90%;max-width:700px;display:flex;flex-direction:column;gap:12px;padding:16px">
<div class="content-storage">
<div id="shp-cats" class="content-storage__cats"></div>
<div id="shp-actions" class="content-storage__actions"></div>
</div>
</div>
</div>
</div>

<!-- INSIDE: CITY -->
<div id="inside-city" class="inside-view" style="overflow:auto">
<div style="padding:10px">
<div id="city-demand" class="demand-board"><div class="demand-board__title">🏙 Городской спрос</div></div>
<div id="city-trade" class="demand-board"><div class="demand-board__title">🛒 Магазин игроков</div></div>
</div>
</div>

<!-- INSIDE: BANK -->
<div id="inside-bank" class="inside-view" style="overflow:auto">
<div style="padding:10px">
<div class="ltd__bank" style="border-radius:12px;height:auto">
<div class="ltd-bank-guarantee__wrapper">
<div id="bank-info" class="ltd-bank_guarantee__text"></div>
<div class="ltd-bank_guarantee__block-main">
<label style="color:#fdf6ee;font-size:.85rem;font-weight:700">Сумма:</label>
<div class="number-input-wrapper">
<input id="loan-amount" class="number-input" style="font-size:16px;min-height:28px" value="200" inputmode="numeric">
</div>
<button id="btn-take-loan" class="text_button text_button--color-green" style="font-size:12px;padding:6px 14px">💳 Взять</button>
<button id="btn-repay-loan" class="text_button text_button--color-purple" style="font-size:12px;padding:6px 14px">💰 Вернуть</button>
</div>
<div style="color:#fdf6ee;font-size:.75rem;margin-top:5px">Лимит кредита: 1000 монет</div>
</div>
</div>
</div>
</div>

</div><!-- main-layout-wrap -->
</div><!-- scr-game -->

<!-- OVER -->
<div id="scr-over" class="screen">
<h1>🏆 Игра окончена</h1>
<div id="leaderboard" style="width:90%;max-width:380px;display:flex;flex-direction:column;gap:8px;margin-bottom:20px"></div>
<button id="btn-restart" class="text_button text_button--color-blue" style="max-width:200px">🔄 Заново</button>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden">
<div class="modal">
<div class="modal__title" id="modal-title"></div>
<div class="modal__body" id="modal-body"></div>
<div class="modal__body-actions">
<button id="modal-cancel" class="text_button text_button--color-purple" style="flex:1;font-size:12px">Отмена</button>
<button id="modal-confirm" class="text_button text_button--color-green" style="flex:1;font-size:12px">ОК</button>
</div>
</div>
</div>

<div id="toast" class="toast hidden"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="js/cfg.js"></script>
<script src="js/data.js"></script>
<script src="js/net.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
