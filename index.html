<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Business Cats</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

<!-- LOBBY -->
<div id="scr-lobby" class="screen active">
<div class="lobby-wrap">
<div class="logo">🐱</div>
<h1>Business Cats</h1>
<p class="lobby-sub">Мультиплеер · До 6 игроков · 3 роли</p>
<div class="lobby-box">
<button id="btn-create" class="btn btn-primary">🏠 Создать комнату</button>
<div class="divider"><span>или войти по коду</span></div>
<div class="join-row">
<input id="inp-code" type="text" class="inp inp-code" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
<button id="btn-join" class="btn btn-secondary">🚀 Войти</button>
</div>
</div>
<p class="lobby-hint">🎲 Имя выберется случайно</p>
</div>
</div>

<!-- WAITING -->
<div id="scr-wait" class="screen">
<div class="wait-wrap">
<h2>⏳ Комната <span id="d-code" class="code-text">------</span></h2>
<button id="btn-copy" class="btn btn-sm">📋 Копировать код</button>
<div id="w-list" class="player-list"></div>
<div id="host-sec" class="hidden">
<label class="chk"><input type="checkbox" id="chk-host-play" checked><span>Хост играет</span></label>
<button id="btn-start" class="btn btn-go" disabled>🏆 Начать</button>
</div>
<label class="chk"><input type="checkbox" id="chk-ready"><span>Я готов</span></label>
<button id="btn-leave" class="btn btn-cancel">Выйти</button>
</div>
</div>

<!-- GAME -->
<div id="scr-game" class="screen">
<header id="topbar">
<div class="tb-left">
<span id="tb-emoji" class="tb-emoji">🐱</span>
<div class="tb-info">
<span id="tb-name" class="tb-name">Игрок</span>
<span id="tb-role" class="tb-role">Роль</span>
</div>
</div>
<div class="tb-center">
<span class="tb-money">🪙</span>
<span id="tb-balance" class="tb-val">0</span>
</div>
<div class="tb-right">
<span id="tb-season" class="tb-sea">1</span>
<span class="tb-sep">/</span>
<span class="tb-max">12</span>
<span id="tb-timer" class="tb-timer">5:00</span>
</div>
</header>
<main id="game-content"></main>
<nav id="bottom-nav">
<button class="nav-btn active" data-tab="home">🏠</button>
<button class="nav-btn" data-tab="cats">🐱</button>
<button class="nav-btn" data-tab="city">🏙</button>
<button class="nav-btn" data-tab="trade">🤝</button>
<button class="nav-btn" data-tab="more">⚙️</button>
</nav>
</div>

<!-- OVER -->
<div id="scr-over" class="screen">
<div class="over-wrap">
<h1>🏆 Игра окончена</h1>
<div id="leaderboard"></div>
<button id="btn-restart" class="btn btn-primary">🔄 Заново</button>
</div>
</div>

<div id="toast" class="toast hidden"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="js/cfg.js"></script>
<script src="js/data.js"></script>
<script src="js/net.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
